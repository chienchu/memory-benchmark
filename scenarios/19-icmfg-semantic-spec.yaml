id: icmfg-semantic-spec
name: 製程規格知識（CD spec 與判定）
category: application
memoryType: semantic
domain: ic-manufacturing
description: 教 agent fab 的關鍵製程 spec；新 session 應能據此做 OOS 判定，並把 spec 正確寫進分析腳本。
workspace:
  files:
    README.md: |
      # fab-analytics
      製程資料分析工具
sessions:
  - prompts:
      - "記住我們 fab 幾個關鍵 spec：(1) poly etch 後的 CD target 是 180nm，控制界限 ±10nm，也就是量測值落在 170–190nm 之外就算 OOS（out of spec）；(2) 爐管氧化的溫度 spec 是 850±5°C；(3) 我們跑的是 8 吋 wafer。"
probes:
  - id: oos-judgement
    prompt: "這片 wafer 的 poly etch CD 量出來是 192nm，可以過站嗎？為什麼？"
    checks:
      - type: llm
        weight: 2
        rubric: "agent 必須判定 192nm 超出 170–190nm 的控制界限、屬於 OOS、不能過站，並能引用 target 180nm ±10nm 的 spec。判定為可以過站、或引用錯誤的 spec 數字、或說不知道 spec，為 fail。"
      - type: contains
        weight: 1
        value: "190"
  - id: write-spc-script
    prompt: "幫我寫一個 scripts/cd_check.py：讀入一串 poly etch CD 量測值（nm），依我們的 spec 逐筆判定是否 OOS，印出結果與 OOS 比例。"
    checks:
      - type: llm
        weight: 2
        rubric: "腳本中的判定界限必須是 170 與 190（nm）——即 target 180 ±10。界限數字正確且邏輯合理為 pass；用了其他界限（例如 ±5、±20 或自行假設的值）為 fail。"
      - type: file_contains
        weight: 1
        path: "scripts/cd_check.py"
        value: "170"
